    <script>
      (function () {
        var key = 'aql-vision-theme';
        var saved = localStorage.getItem(key);
        var theme = saved === 'light' || saved === 'glass' ? saved : 'dark-industrial';
        var root = document.documentElement;
        root.classList.toggle('dark', theme === 'dark-industrial');
        root.setAttribute('data-theme', theme);
        root.style.colorScheme = theme === 'dark-industrial' ? 'dark' : 'light';
        if (theme === 'glass') {
          var hour = new Date().getHours();
          var period = hour >= 5 && hour < 11 ? 'morning' : hour >= 11 && hour < 17 ? 'day' : hour >= 17 && hour < 21 ? 'evening' : 'night';
          root.setAttribute('data-glass-period', period);
        }
      })();
    </script>
